<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Console | Jhony Bosio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../colors_and_type.css">
    <style>
        :root {
            --navy-dark: #050C1A;
            --navy-card: rgba(10, 27, 61, 0.4);
            --gold: #C5A059;
            --blue-cyan: #00D1FF;
            --border-glass: rgba(255, 255, 255, 0.08);
            --shadow-premium: 0 20px 40px rgba(0, 13, 56, 0.5);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--navy-dark);
            color: #FFFFFF;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0, 209, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.25;
            z-index: -1;
            pointer-events: none;
        }
        .bg-glow-1 {
            position: fixed;
            top: -20%; left: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(0, 71, 187, 0.2) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
        .bg-glow-2 {
            position: fixed;
            bottom: -10%; right: -10%; width: 60%; height: 60%;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.1) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
        header {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
        }
        .logo-box {
            width: 44px; height: 44px;
            background: url('logo-2.png') no-repeat center center;
            background-size: cover;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 12px rgba(0, 71, 187, 0.3);
        }
        .logo-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.05em;
        }
        .status-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            color: #fff;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .status-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
        main {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px 80px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        /* ── Login Lock Screen ────────────────────────────────────── */
        .login-card {
            background: var(--navy-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow-premium);
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .login-card h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF 60%, #E2E6EC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .login-card p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: -10px;
        }
        .login-card input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            padding: 14px;
            border-radius: 12px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            font-family: 'JetBrains Mono', monospace;
        }
        .login-card input:focus {
            border-color: var(--blue-cyan);
            background: rgba(0, 209, 255, 0.03);
            box-shadow: 0 0 15px rgba(0, 209, 255, 0.1);
        }
        .login-card button {
            width: 100%;
            background: var(--gold);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2);
        }
        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(197, 160, 89, 0.4);
        }

        /* ── Dashboard Operations Console ────────────────────────── */
        .dash-content {
            display: none;
            width: 100%;
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            align-items: start;
        }
        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Sidebar Navigation */
        .sidebar-nav {
            background: var(--navy-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 20px 12px;
            box-shadow: var(--shadow-premium);
        }
        .nav-header-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            display: block;
            margin-bottom: 15px;
            padding-left: 12px;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .nav-item {
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: left;
            color: rgba(255, 255, 255, 0.7);
        }
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 71, 187, 0.15) 0%, rgba(10, 27, 61, 0.5) 100%);
            border-color: rgba(0, 209, 255, 0.25);
            color: #fff;
            box-shadow: inset 0 0 12px rgba(0, 209, 255, 0.05);
        }
        .nav-icon {
            font-size: 20px;
        }
        .nav-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-grow: 1;
        }
        .nav-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 13px;
        }
        .nav-status-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .nav-status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            display: inline-block;
        }
        .nav-status-dot.active {
            background-color: var(--blue-cyan);
            box-shadow: 0 0 6px var(--blue-cyan);
        }
        .nav-status-dot.service {
            background-color: var(--gold);
            box-shadow: 0 0 6px var(--gold);
        }
        .nav-status-text {
            font-size: 9px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .nav-item.active .nav-status-text {
            color: var(--blue-cyan);
        }
        .nav-item.active[id="nav-vault"] .nav-status-text,
        .nav-item.active[id="nav-hermes"] .nav-status-text,
        .nav-item.active[id="nav-reels"] .nav-status-text {
            color: var(--gold);
        }

        /* Workspace Content */
        .workspace-area {
            min-height: 500px;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        .workspace-area.loading {
            opacity: 0.3;
        }
        .hero {
            margin-bottom: 40px;
        }
        .hero h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: clamp(24px, 3.5vw, 36px);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FFF 60%, #E2E6EC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .hero p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            max-width: 800px;
        }
        
        .section-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--gold);
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(197, 160, 89, 0.3), transparent);
        }

        /* Pipeline Grid */
        .pipeline-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }
        @media (max-width: 900px) {
            .pipeline-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .pipeline-grid { grid-template-columns: 1fr; }
        }
        .pipeline-card {
            background: var(--navy-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .pipeline-card:hover {
            border-color: rgba(0, 209, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 13, 56, 0.4);
        }
        .step-num {
            position: absolute;
            top: 15px; right: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 20px; font-weight: 800;
            color: rgba(255, 255, 255, 0.05);
            line-height: 1;
        }
        .step-icon {
            font-size: 22px;
            margin-bottom: 12px;
            display: inline-block;
        }
        .pipeline-card h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px; font-weight: 700;
            color: #fff; margin-bottom: 6px;
        }
        .pipeline-card p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
        }

        /* Split Workspace layout */
        .workspace-split {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 30px;
            margin-top: 30px;
        }
        @media (max-width: 1050px) {
            .workspace-split { grid-template-columns: 1fr; }
        }

        /* Terminal card */
        .terminal-card {
            background: #020710;
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-premium);
            height: fit-content;
        }
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }
        .dots {
            display: flex; gap: 6px;
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
        }
        .dot-r { background: #FF5F56; }
        .dot-y { background: #FFBD2E; }
        .dot-g { background: #27C93F; }
        .terminal-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }
        .terminal-body {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #A2B6D4;
        }
        .terminal-line {
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .cmd-prompt { color: var(--blue-cyan); font-weight: bold; }
        .cmd-text { color: #fff; }
        .code-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
            margin: 15px 0;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }
        .code-box:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(0, 209, 255, 0.2);
        }
        .code-box pre {
            margin: 0;
            font-size: 12px;
            overflow-x: auto;
            color: #E2E6EC;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .btn-copy {
            position: absolute;
            top: 12px; right: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-copy:hover {
            background: var(--blue-cyan);
            border-color: var(--blue-cyan);
            color: #000;
        }
        .doc-list {
            list-style: none;
            margin-top: 15px;
        }
        .doc-list li {
            padding: 10px 14px;
            border-left: 2px solid var(--gold);
            background: rgba(197, 160, 89, 0.03);
            margin-bottom: 8px;
            border-radius: 0 8px 8px 0;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        /* Mockup area card */
        .mockup-card {
            background: var(--navy-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-premium);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 380px;
        }

        /* Twitter slide simulator */
        .slider-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            margin: 15px auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000d38;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
        }
        .slide.active {
            opacity: 1;
            z-index: 2;
        }
        .slide-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .slide-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1.5px solid var(--gold);
            background: url('../jhony-bosio-foto.jpg') center/cover no-repeat;
        }
        .slide-author-name {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px; font-weight: 700; color: #fff;
            line-height: 1.2;
        }
        .slide-author-handle {
            font-size: 11px; color: rgba(255,255,255,0.5);
        }
        .slide-body {
            flex-grow: 1;
            display: flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
            font-size: clamp(13px, 2.5vw, 17px);
            font-weight: 500;
            color: #E2E6EC;
            line-height: 1.5;
        }
        .slide-footer-metrics {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 12px;
            margin-top: 15px;
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        .slider-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .btn-slide-nav {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-slide-nav:hover {
            background: var(--gold);
            border-color: var(--gold);
            color: #000;
            transform: scale(1.05);
        }
        .slide-dots {
            display: flex; gap: 8px;
        }
        .slide-dot {
            width: 8px; height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }
        .slide-dot.active {
            background: var(--blue-cyan);
            width: 20px;
            border-radius: 10px;
        }

        /* Dynamic Widget Areas & Elements */
        .profile-btn {
            transition: all 0.2s;
        }
        .profile-btn.active {
            background: var(--blue-cyan) !important;
            border-color: var(--blue-cyan) !important;
            color: #000 !important;
            box-shadow: 0 0 10px rgba(0, 209, 255, 0.2);
        }

        /* Bottom Actions buttons */
        .bottom-actions {
            margin-top: 40px;
            display: flex;
            justify-content: flex-start;
            gap: 15px;
        }
        @media (max-width: 500px) {
            .bottom-actions { flex-direction: column; }
        }
        .btn-action-primary {
            background: var(--gold);
            color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 13px;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2);
        }
        .btn-action-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(197, 160, 89, 0.35);
        }
        .btn-action-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid var(--border-glass);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-action-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        /* Compliance Footer Notice */
        .compliance-notice {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            line-height: 1.5;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <header>
        <a href="#" class="logo">
            <div class="logo-box"></div>
            <span class="logo-text">JHONY BOSIO CO.</span>
        </a>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="status-badge" id="statusBadge">
                <div class="status-dot status-pulse" id="statusDot" style="background-color: var(--gold); box-shadow: 0 0 8px var(--gold);"></div>
                <span id="statusText">Acesso Restrito</span>
            </div>
            <button id="logoutBtn" onclick="logout()" style="display: none; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: #fff; padding: 6px 14px; border-radius: 99px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.3s; font-family: 'Plus Jakarta Sans', sans-serif;">SAIR</button>
        </div>
    </header>

    <main>
        <!-- LOCK SCREEN -->
        <div class="login-card" id="loginArea">
            <div class="logo-box" style="margin: 0 auto 20px auto; width: 64px; height: 64px; border-radius: 16px;"></div>
            <h1>Área de Operações</h1>
            <p>Acesso restrito ao proprietário.</p>
            <input type="password" id="passInput" placeholder="Chave de Acesso">
            <button onclick="checkPass()">Entrar no Painel</button>
        </div>

        <!-- MAIN DASHBOARD -->
        <div class="dash-content" id="dashArea">
            <div class="dashboard-grid">
                <!-- SIDEBAR MENU -->
                <aside class="sidebar-nav">
                    <span class="nav-header-text">Áreas Estratégicas</span>
                    <nav class="nav-links">
                        <button class="nav-item active" onclick="switchStrategy('blue3')" id="nav-blue3">
                            <span class="nav-icon">📈</span>
                            <div class="nav-meta">
                                <span class="nav-title">Assessoria Blue3</span>

            });
            
            dots.forEach((dot, idx) => {
                if (idx === contentActiveSlide) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function nextSlide() {
            contentActiveSlide = (contentActiveSlide + 1) % contentSlidesCount;
            updateContentSlider();
        }

        function prevSlide() {
            contentActiveSlide = (contentActiveSlide - 1 + contentSlidesCount) % contentSlidesCount;
            updateContentSlider();
        }

        function goToSlide(idx) {
            contentActiveSlide = idx;
            updateContentSlider();
        }

        // ── Copy Bash Command Helper ──────────────────────────────
        function copyCommand() {
            const cmd = document.getElementById('cmdText').innerText;
            navigator.clipboard.writeText(cmd).then(() => {
                const btn = document.getElementById('btnCopyText');
                if (btn) {
                    btn.innerText = 'Copiado!';
                    btn.style.background = '#27C93F';
                    btn.style.borderColor = '#27C93F';
                    btn.style.color = '#000';
                    
                    setTimeout(() => {
                        btn.innerText = 'Copiar';
                        btn.style.background = 'rgba(255,255,255,0.05)';
                        btn.style.borderColor = 'rgba(255,255,255,0.1)';
                        btn.style.color = '#fff';
                    }, 2000);
                }
            });
        }

        // ── Secure Vault Mock Decryption ──────────────────────────
        function unlockVaultMock() {
            const key = document.getElementById('vaultMasterKey').value;
            if (key === 'jhony2026') {
                document.getElementById('vaultLockArea').style.display = 'none';
                document.getElementById('vaultUnlockedArea').style.display = 'block';
            } else {
                alert('Chave mestra incorreta.');
            }
        }

        // ── Remotion Reels Subtitle simulation ─────────────────────
        let reelsPlaying = false;
        let reelsInterval = null;
        const reelsCaptions = [
            "CARTEIRAS <span style='color:var(--gold); font-weight:900; margin-left:2px;'>DIVERSIFICADAS</span>,",
            "PRÁTICAS E <span style='color:var(--blue-cyan); font-weight:900; margin-left:2px;'>ACESSÍVEIS</span>.",
            "EU SOU A <span style='color:var(--gold); font-weight:900; margin-left:2px;'>RAQUEL SÁ</span>,",
            "ESTATEGISTA DA <span style='color:var(--blue-cyan); font-weight:900; margin-left:2px;'>XP INVESTIMENTOS</span>."
        ];
        let reelsCaptionIdx = 0;

        function toggleReelsPlay() {
            const btn = document.getElementById('btnPhonePlay');
            const display = document.getElementById('phoneSubtitleDisplay');
            const waveBars = document.querySelectorAll('.wave-bar');
            
            if (!reelsPlaying) {
                reelsPlaying = true;
                if (btn) btn.innerText = '⏸';
                
                waveBars.forEach(bar => {
                    bar.style.animationPlayState = 'running';
                });
                
                reelsInterval = setInterval(() => {
                    reelsCaptionIdx = (reelsCaptionIdx + 1) % reelsCaptions.length;
                    if (display) display.innerHTML = reelsCaptions[reelsCaptionIdx];
                }, 1500);
            } else {
                reelsPlaying = false;
                if (btn) btn.innerText = '▶';
                
                waveBars.forEach(bar => {
                    bar.style.animationPlayState = 'paused';
                });
                
                clearInterval(reelsInterval);
            }
        }

        // ── Open Design Widget Controls ───────────────────────────
        function toggleODView(view) {
            const btnColors = document.getElementById('btnOD-colors');
            const btnMockup = document.getElementById('btnOD-mockup');
            const panelColors = document.getElementById('od-panel-colors');
            const panelMockup = document.getElementById('od-panel-mockup');
            
            if (!panelColors || !panelMockup) return;
            
            if (view === 'colors') {
                btnColors.classList.add('active');
                btnMockup.classList.remove('active');
                panelColors.style.display = 'flex';
                panelMockup.style.display = 'none';
            } else {
                btnColors.classList.remove('active');
                btnMockup.classList.add('active');
                panelColors.style.display = 'none';
                panelMockup.style.display = 'flex';
            }
        }

        // ── Generic Toast Helper ──────────────────────────────────
        function triggerToast(msg) {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.background = 'rgba(10, 27, 61, 0.9)';
            toast.style.backdropFilter = 'blur(10px)';
            toast.style.border = '1px solid var(--blue-cyan)';
            toast.style.color = '#fff';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '12px';
            toast.style.fontSize = '12px';
            toast.style.fontFamily = "'Plus Jakarta Sans', sans-serif";
            toast.style.fontWeight = '600';
            toast.style.zIndex = '9999';
            toast.style.boxShadow = '0 10px 30px rgba(0, 209, 255, 0.2)';
            toast.style.transition = 'all 0.3s ease';
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(10px)';
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0)';
            }, 100);
            
            toast.innerText = msg;
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }
    </script>
</body>
