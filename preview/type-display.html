<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0D1C3A; padding: 24px 28px; }
  .specimen { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 20px; }
  .specimen:last-child { border-bottom: none; margin-bottom: 0; }
  .meta { font-family: 'DM Sans', sans-serif; font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .text { font-family: 'Plus Jakarta Sans', sans-serif; color: white; text-wrap: pretty; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="meta">Display Hero — 72px / 700 / -0.03em</div>
    <div class="text" style="font-size:52px;font-weight:700;line-height:1.1;letter-spacing:-0.03em;">Sua jornada<br>tem um plano.</div>
  </div>
  <div class="specimen">
    <div class="meta">Display XL — 48px / 700 / -0.03em</div>
    <div class="text" style="font-size:40px;font-weight:700;line-height:1.15;letter-spacing:-0.025em;">A melhor escolha para<br>os seus investimentos.</div>
  </div>
  <div class="specimen">
    <div class="meta">H1 — 36px / 700 / -0.02em</div>
    <div class="text" style="font-size:32px;font-weight:700;line-height:1.2;letter-spacing:-0.02em;">Nossa jornada começou em 2009</div>
  </div>
  <div class="specimen">
    <div class="meta">H2 — 28px / 700</div>
    <div class="text" style="font-size:26px;font-weight:700;line-height:1.3;">Conheça nossas segmentações</div>
  </div>
  <div class="specimen">
    <div class="meta">H3 — 20px / 600</div>
    <div class="text" style="font-size:20px;font-weight:600;line-height:1.35;color:rgba(255,255,255,0.85);">Financial Planning</div>
  </div>
</body>
</html>
