<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F5F6F8; padding: 20px; font-family: 'DM Sans', sans-serif; }
  .section { margin-bottom: 18px; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #9AA5B4; margin-bottom: 8px; }
  .scale { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .token { background: white; border-radius: 6px; padding: 8px 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); text-align: center; }
  .bar { background: #1B6FEF; border-radius: 3px; margin: 0 auto 6px; width: 20px; }
  .tok-name { font-size: 10px; font-weight: 600; color: #374151; }
  .tok-val { font-size: 10px; color: #9AA5B4; }
  .radii-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .rad-sample { background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.06); width: 60px; height: 44px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 3px; }
  .rad-label { font-size: 10px; font-weight: 600; color: #374151; }
  .rad-val { font-size: 10px; color: #9AA5B4; }
</style>
</head>
<body>
  <div class="section">
    <div class="label">Spacing Scale (8pt base)</div>
    <div class="scale">
      <div class="token"><div class="bar" style="height:4px"></div><div class="tok-name">--space-1</div><div class="tok-val">4px</div></div>
      <div class="token"><div class="bar" style="height:8px"></div><div class="tok-name">--space-2</div><div class="tok-val">8px</div></div>
      <div class="token"><div class="bar" style="height:12px"></div><div class="tok-name">--space-3</div><div class="tok-val">12px</div></div>
      <div class="token"><div class="bar" style="height:16px"></div><div class="tok-name">--space-4</div><div class="tok-val">16px</div></div>
      <div class="token"><div class="bar" style="height:20px"></div><div class="tok-name">--space-5</div><div class="tok-val">20px</div></div>
      <div class="token"><div class="bar" style="height:24px"></div><div class="tok-name">--space-6</div><div class="tok-val">24px</div></div>
      <div class="token"><div class="bar" style="height:32px"></div><div class="tok-name">--space-8</div><div class="tok-val">32px</div></div>
      <div class="token"><div class="bar" style="height:40px"></div><div class="tok-name">--space-10</div><div class="tok-val">40px</div></div>
      <div class="token"><div class="bar" style="height:48px"></div><div class="tok-name">--space-12</div><div class="tok-val">48px</div></div>
      <div class="token"><div class="bar" style="height:64px"></div><div class="tok-name">--space-16</div><div class="tok-val">64px</div></div>
    </div>
  </div>

  <div class="section">
    <div class="label">Border Radii</div>
    <div class="radii-row">
      <div class="rad-sample" style="border-radius:6px"><div class="rad-label">--radius-sm</div><div class="rad-val">6px</div></div>
      <div class="rad-sample" style="border-radius:12px"><div class="rad-label">--radius-md</div><div class="rad-val">12px</div></div>
      <div class="rad-sample" style="border-radius:16px"><div class="rad-label">--radius-lg</div><div class="rad-val">16px</div></div>
      <div class="rad-sample" style="border-radius:24px"><div class="rad-label">--radius-xl</div><div class="rad-val">24px</div></div>
      <div class="rad-sample" style="border-radius:999px"><div class="rad-label">--radius-full</div><div class="rad-val">pill</div></div>
    </div>
  </div>
</body>
</html>
